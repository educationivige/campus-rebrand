<!-- PLANTILLA RSS — Registro de Certificados LfE.
     Feed publico: SOLO datos no sensibles. NO incluir campos admin
     (Comentarios internos, Motivo no validacion, Nota, Puntos) ni
     botones de accion ni #pdf-container (el JS de pdf.js no corre en
     un lector de RSS). -->
<div class="ividb_cert">
    <div class="ividb_left">
        <div class="ividb_uservisible">
            <p class="ividb_text"><span class="ividb_es">Nombre del certificado</span><span class="ividb_en">Certificate name</span><span class="ividb_cs">Název certifikátu</span><span class="ividb_de">Zertifikatsname</span><span class="ividb_it">Nome del certificato</span><span class="ividb_pt">Nome do certificado</span><span class="ividb_sv">Certifikatnamn</span>: <span class="ividb_name">[[activityname]]</span></p>
            <p class="ividb_text">Tipo de actividad: <span class="ividb_bold">[[activitytype]]</span></p>
            <p class="ividb_text">Duración: <span class="ividb_bold">[[duration]]</span></p>
            <p class="ividb_text">Fecha de subida: <span class="ividb_bold">##timeadded##</span></p>
        </div>
    </div>
    <div class="ividb_right">
        <p class="ividb_certificatelink">[[Certificado]]</p>
    </div>
</div>
