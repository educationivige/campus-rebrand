<div class="defaulttemplate">
<table class="mod-data-default-template" role="presentation" data-origin="html_table" width="100%" border="0">
    <tbody>
        <tr>
            <td class="template-field cell c0">Tipo de certificado:</td>
            <td class="template-token cell c1 lastcol" colspan="3">[[activitytype]]</td>
        </tr>
        <tr class="searchcontrols">
            <td class="template-field cell c0">Estado de validación:</td>
            <td class="template-token cell c1 lastcol" colspan="3">[[Estado de validación]]</td>
        </tr>
        <tr>
            <td class="template-field cell c0">Nombre de certificado:</td>
            <td class="template-token cell c1 lastcol" colspan="3">[[activityname]]</td>
        </tr>
        <tr class="searchcontrols lastrow">
            <td class="template-field cell c0">Nombre del usuario:</td>
            <td class="template-token cell c1 lastcol">##firstname##</td>
            <td class="template-field cell c0">Apellido:</td>
            <td class="template-token cell c1 lastcol">##lastname##</td>
        </tr>
    </tbody>
</table>
</div>
