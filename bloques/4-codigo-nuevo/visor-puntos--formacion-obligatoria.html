<!-- ============================================================
     VISOR — Formación Obligatoria + estado (COMPLETA / INCOMPLETA).
     Badges tipo píldora con los colores nuevos (verde = completa,
     rojo = incompleta). Estilo por clases en css-adicional.css:
     .ivi-status-badge / --complete / --incomplete. Multi-idioma.
     Contenedor: .title_lfe.visor
     ============================================================ -->
<div class="title_lfe visor">
  <h3>{mlang es}Formación Obligatoria{mlang}{mlang other}Mandatory Training{mlang}{mlang pt}Formação obrigatória{mlang}</h3>
  <span class="ivi-status-badge ivi-status-badge--complete">{mlang es}COMPLETA{mlang}{mlang pt}COMPLETA{mlang}{mlang other}COMPLETE{mlang}</span>
  <span class="ivi-status-badge ivi-status-badge--incomplete">{mlang es}INCOMPLETA{mlang}{mlang pt}INCOMPLETA{mlang}{mlang other}INCOMPLETE{mlang}</span>
</div>
